name: 07 - Contexts
run-name: 07 - Contexts | EVENT NAME - ${{github.event_name}}
on:
  push:
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug mode"
        required: false
        type: boolean
        default: false
jobs:
  echo-data:
    runs-on: ubuntu-latest
    steps:
      - name: Debug status
        run: echo "The debug is ${{ case(inputs.debug == true, 'enabled', 'disabled') }}"
      - name: Show github context
        run: |
          echo "Event: ${{github.event_name}}"
          echo "Ref: ${{github.ref}}"
          echo "Sha: ${{github.sha}}"
          echo "Actor: ${{github.actor}}"
          echo "Workflow: ${{github.workflow}}"
      - name: Show var
        run: echo "MY_VAR = ${{vars.MY_VAR}}"
